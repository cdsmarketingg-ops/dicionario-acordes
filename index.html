<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>Dicionário de Acordes para Tecladistas</title>

    <script>
  window.pixelId = "69c5b3da116ebd99597c5148";
  var a = document.createElement("script");
  a.setAttribute("async", "");
  a.setAttribute("defer", "");
  a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
  document.head.appendChild(a);
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script
  src="https://cdn.utmify.com.br/scripts/utms/latest.js"
  data-utmify-prevent-xcod-sck
  data-utmify-prevent-subids
  async
  defer
></script>


<script>
(function () {
  const POLL_MS = 500;

  function getStorageKey() {
    const url = new URL(window.location.href);
    const current = url.searchParams.get("utm_source");
    if (current === "FB") return "lead";
    if (current === "google") return "lead-google";
    return null;
  }

  function getLeadId(storageKey) {
    if (!storageKey) return null;
    const raw = localStorage.getItem(storageKey);
    if (!raw) return null;
    try {
      const obj = JSON.parse(raw);
      return obj && obj._id ? String(obj._id) : null;
    } catch {
      return null;
    }
  }

  function applyUtmIfNeeded() {
    const url = new URL(window.location.href);
    const current = url.searchParams.get("utm_source");
    const storageKey = getStorageKey();
    const id = getLeadId(storageKey);
    if (!id) return false;

    let desired = null;
    if (current === "FB") {
      desired = "FBjLj" + id;
    } else if (current === "google") {
      desired = "googlejLj" + id;
    }

    if (!desired) return false; 

    url.searchParams.set("utm_source", desired);
    window.location.replace(url.toString());
    return true;
  }

  if (applyUtmIfNeeded()) return;

  const interval = setInterval(() => {
    if (applyUtmIfNeeded()) clearInterval(interval);
  }, POLL_MS);
})();
</script>

  </body>
</html>
